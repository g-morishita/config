"$schema" = "https://starship.rs/config-schema.json"

# Visual style
add_newline = true
command_timeout = 1000
scan_timeout = 30
palette = "tokyo_night"

format = """
$status$username$hostname$directory$git_branch$git_status$line_break$character
"""

[palettes.tokyo_night]
blue = "#7aa2f7"
cyan = "#7dcfff"
green = "#9ece6a"
orange = "#ff9e64"
purple = "#bb9af7"
red = "#f7768e"
yellow = "#e0af68"
fg = "#c0caf5"
muted = "#565f89"

[username]
show_always = true
style_user = "bold yellow"
style_root = "bold red"
format = "[󰣇 $user]($style) "

[hostname]
ssh_only = true
disabled = false
trim_at = "."
format = "[@$hostname](bold blue) "

[directory]
style = "bold cyan"
truncation_length = 3
truncate_to_repo = false
truncation_symbol = "…/"
read_only = " "
read_only_style = "bold red"
format = "[ $path]($style)[$read_only]($read_only_style) "

[directory.substitutions]
"~" = "󰋜 ~"
"Documents" = "󰈙 Docs"
"Downloads" = " Downloads"
"Desktop" = "󰇄 Desktop"

[git_branch]
symbol = " "
style = "bold purple"
format = "[ $symbol$branch ]($style)"

[git_status]
style = "bold red"
format = "[ $all_status$ahead_behind ]($style)"

[status]
disabled = false
symbol = "✖ "
success_symbol = ""
format = "[$symbol$status ](bold red)"
map_symbol = true

[cmd_duration]
min_time = 300
style = "bold yellow"
format = "[󱫑 $duration ]($style)"

[time]
disabled = false
time_format = "%H:%M"
style = "dimmed white"
format = "[ $time ]($style)"

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold blue)"
vimcmd_visual_symbol = "[V](bold yellow)"
vimcmd_replace_symbol = "[R](bold purple)"
